# Offline CI — golden tests, third-party cross-checks (lunar-javascript in-process,
# HKO/JPL fixtures), sensitivity sweeps, typecheck, build. No network calls in the
# test run: live JPL verification is a separate manual workflow.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERIFY_OFFLINE: "1"
      VERIFY_LIVE_JPL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
